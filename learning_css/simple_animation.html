<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simple animation</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            background-color: aqua;
            position: relative;
            border-radius:20px;
            animation: movingbox;
            animation-duration: 5s;
            animation-iteration-count: infinite;
            animation-delay: 5s;
            animation-direction: alternate-reverse;
        }

        @keyframes movingbox{
            0%{background-color: aqua;left: 0px;top:0px}
             25%{background-color: yellow;left: 300px;top:0px}
              50%{background-color: blue;left: 300px;top:300px}
               75%{background-color: green;left: 0px;top:300px}
                100%{background-color: aqua;left: 0px;top:0px}
            
        }


    </style>

</head>
<body>
    <div>

    </div>
    
    
</body>
</html>
