<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            position: relative;
            margin: 100px;

        }
        div{
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            font-size: 25px;
            text-align: center;

        }
        .red{
            background-color: red;
            left: 40px;


        }
        .green{
            background-color: green;
            left: 100px;

        }
        .pink{
            background-color: pink;
            left: 180px;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="red">red</div>
        <div class="green">green</div>
        <div class="pink">pink</div>

    </div>
    
</body>
</html>
