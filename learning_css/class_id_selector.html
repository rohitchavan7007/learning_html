<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .heading1{
            color: green;
        }
        .heading2{
            color: rgb(158, 238, 10);
        }
        #heading3{
            color: rgb(39, 12, 246);
        }
        #heading4{
            color: rgb(149, 20, 229);
        }
        .heading5{
            color: rgb(232, 11, 11);
        }
        .heading6{
            color: rgb(222, 24, 215);
            background-color: rgb(9, 9, 9);
            font-size: 20px;
            font-family: 'Courier New', Courier, monospace;
        }
        #heading_f_size{font-size: 30px;}
        .h_color1{
            color: aqua;
        }

    .h_color2{
            color: rgb(246, 13, 13);
        }
        .h_color3{
            color: rgb(46, 25, 233);
        }
        .h_bgcolor1{
            background-color: black;
        }
                .h_bgcolor2{
            background-color: rgb(48, 232, 15);
        }
                .h_bgcolor3{
            background-color: rgb(203, 237, 15);
        }
        

         
    </style>
    
</head>
<body>
    <!-- class selector Exmple -->
     <h1 class="heading1">hello dear</h1>
     <h1 class="heading2">hello dear</h1>
     
     <!-- id selector Example -->
      <h1 id="heading3">hello wellcome to pune</h1>
      <h1 id="heading4">hello wellcome to pune</h1>

<!-- class id exanple -->
 <h1 class="heading5" id="heading6">good afternoon</h1>
<!-- one class use in multiple times but different color property -->
 <h2 class="heading_f_size h_color1 h_bgcolor1">rohit </h2>
 <h2 class="heading_f_size h_color2 h_bgcolor2">mayur</h2>
 <h2 class="heading_f_size h_color3 h_bgcolor3">siddhrth</h2>
</body>
</html>
